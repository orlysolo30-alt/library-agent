<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סוכן הספרייה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Frank+Ruhl+Libre:wght@300;400;700&family=Caveat:wght@400;600&family=Assistant:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:    #f6f1e7;
      --card:     #fffdf8;
      --ink:      #241c10;
      --ink-soft: #4a3d28;
      --muted:    #9a8e7a;
      --gold:     #b8883a;
      --gold-lt:  #e8c87a;
      --border:   #e0d8c8;
      --radius:   14px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 16px;
      line-height: 1.75;
      direction: rtl;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 4rem 1.5rem 3rem;
    }

    .header-icon {
      display: block;
      margin: 0 auto 1.25rem;
      width: 64px;
      opacity: 0.85;
    }

    h1 {
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 2.8rem);
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-family: 'Caveat', cursive;
      font-size: 1.15rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .header-divider span {
      display: block;
      height: 1px;
      width: 80px;
      background: linear-gradient(to left, transparent, var(--border));
    }
    .header-divider span:first-child {
      background: linear-gradient(to right, transparent, var(--border));
    }

    /* ── FORM AREA ───────────────────────────────────────── */
    .form-area {
      max-width: 560px;
      margin: 0 auto 2.5rem;
      padding: 0 1.25rem;
    }

    /* Collapsed mini-bar */
    .mini-bar {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1.1rem;
      cursor: pointer;
      font-family: 'Rubik', sans-serif;
      font-size: 0.88rem;
      color: var(--muted);
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 8px rgba(0 0 0 / 0.04);
    }

    .mini-bar:hover {
      border-color: var(--gold);
      box-shadow: 0 2px 12px rgba(184 136 58 / 0.12);
    }

    .mini-bar svg { flex-shrink: 0; opacity: 0.5; }

    .mini-book {
      flex: 1;
      color: var(--ink-soft);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .mini-new {
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      color: var(--gold);
      white-space: nowrap;
    }

    /* Form card */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 2px 20px rgba(0 0 0 / 0.05);
      transition: opacity 0.25s ease, max-height 0.4s ease;
      overflow: hidden;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-family: 'Rubik', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    input {
      width: 100%;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.95rem;
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1rem;
      color: var(--ink);
      direction: rtl;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    input::placeholder { color: #c8bfaa; }

    input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184 136 58 / 0.12);
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }

    .submit-btn {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 9px;
      font-family: 'Rubik', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: background 0.18s, transform 0.12s;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--ink-soft);
      transform: translateY(-1px);
    }

    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-icon { width: 18px; height: 18px; opacity: 0.75; }

    /* ── RESULT SECTION ──────────────────────────────────── */
    #result-section {
      max-width: 760px;
      margin: 0 auto 5rem;
      padding: 0 1.25rem;
      display: none;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .result-label {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: var(--gold);
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.32rem 0.85rem;
      font-family: 'Rubik', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }
    .copy-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── ANALYSIS CARD ───────────────────────────────────── */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1.75rem, 5vw, 3.25rem);
      box-shadow:
        0 1px 0 rgba(255 255 255 / 0.8) inset,
        0 4px 30px rgba(0 0 0 / 0.07);
      line-height: 1.95;
      position: relative;
    }

    /* Subtle top accent line */
    .result-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0; left: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
      background: linear-gradient(to left, transparent, var(--gold-lt), transparent);
    }

    /* ── MARKDOWN STYLES ─────────────────────────────────── */
    .result-card h1 {
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: clamp(1.3rem, 3.5vw, 1.65rem);
      color: var(--ink);
      margin: 0 0 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }

    .result-card h2 {
      font-family: 'Rubik', sans-serif;
      font-weight: 500;
      font-size: 1.05rem;
      color: var(--ink-soft);
      margin: 2.5rem 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Gold dot before h2 */
    .result-card h2::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .result-card h3 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      margin: 1.25rem 0 0.4rem;
    }

    .result-card p { margin: 0.65rem 0; color: var(--ink-soft); }

    .result-card ul,
    .result-card ol { padding-right: 1.5rem; margin: 0.5rem 0; }

    .result-card li { margin: 0.3rem 0; color: var(--ink-soft); }

    .result-card strong { color: var(--ink); font-weight: 600; }

    .result-card em { color: var(--muted); font-style: italic; }

    .result-card blockquote {
      margin: 1.25rem 0;
      padding: 0.75rem 1.25rem 0.75rem 0;
      border-right: 2px solid var(--gold-lt);
      color: var(--muted);
      font-style: italic;
      font-size: 1.05rem;
      position: relative;
    }

    .result-card blockquote::before {
      content: '"';
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 3rem;
      color: var(--gold-lt);
      position: absolute;
      top: -0.5rem;
      right: -0.5rem;
      line-height: 1;
    }

    .result-card hr {
      border: none;
      margin: 2rem 0;
      display: flex;
      align-items: center;
      text-align: center;
    }

    .result-card hr::before {
      content: '· · ·';
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      color: var(--border);
      display: block;
      width: 100%;
      letter-spacing: 0.5em;
    }

    /* ── STREAMING CURSOR ────────────────────────────────── */
    .cursor::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--gold);
      margin-right: 3px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── LOADING ─────────────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
      gap: 1rem;
    }

    .quill-anim { animation: quillMove 2s ease-in-out infinite; }
    @keyframes quillMove {
      0%, 100% { transform: rotate(-5deg) translateY(0); }
      50%       { transform: rotate(5deg) translateY(-4px); }
    }

    .loading-text {
      font-family: 'Caveat', cursive;
      font-size: 1.3rem;
      color: var(--muted);
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
      .form-card { padding: 1.4rem; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <!-- Hand-drawn book icon SVG -->
  <svg class="header-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 9 C10 9 29 7.5 32 9.5 L32 54.5 C32 54.5 12 52 10 54 Z"
          stroke="#241c10" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M32 9.5 C32 9.5 51 7.5 54 9 L54 54 C54 54 33 52 32 54.5 Z"
          stroke="#241c10" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="15" y1="20" x2="27" y2="19.2" stroke="#241c10" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="15" y1="26" x2="27" y2="25.3" stroke="#241c10" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <line x1="15" y1="32" x2="27" y2="31.4" stroke="#241c10" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <line x1="37" y1="20" x2="49" y2="19.2" stroke="#241c10" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="37" y1="26" x2="49" y2="25.3" stroke="#241c10" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <line x1="37" y1="32" x2="49" y2="31.4" stroke="#241c10" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  </svg>

  <h1>סוכן הספרייה</h1>
  <p class="tagline">ניתוח ספרותי מעמיק — אישי ומפורט</p>

  <div class="header-divider">
    <span></span>
    <!-- Quill SVG -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c8bfaa" stroke-width="1.3" stroke-linecap="round">
      <path d="M20 4 C20 4 14 6 10 12 C8 15 7 18 7 21 L9 19 C9 19 11 13 16 9"/>
      <path d="M7 21 C7 21 6 18 8 16"/>
      <line x1="20" y1="4" x2="17" y2="7"/>
    </svg>
    <span></span>
  </div>
</header>

<!-- ── FORM AREA ── -->
<div class="form-area" id="form-area">

  <!-- Mini-bar shown after submission -->
  <div class="mini-bar" id="mini-bar" onclick="resetForm()">
    <svg width="16" height="16" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <path d="M10 9 C10 9 29 8 32 9.5 L32 54 C32 54 12 52 10 54 Z"/>
      <path d="M32 9.5 C32 9.5 51 8 54 9 L54 54 C54 54 33 52 32 54 Z"/>
    </svg>
    <span class="mini-book" id="mini-book-label"></span>
    <span class="mini-new">+ ספר חדש</span>
  </div>

  <!-- Main form -->
  <div class="form-card" id="form-card">
    <div class="field">
      <label for="username">שמך</label>
      <input id="username" type="text" placeholder="למשל: שרה" autocomplete="name" />
    </div>
    <div class="row">
      <div class="field">
        <label for="book">שם הספר</label>
        <input id="book" type="text" placeholder="למשל: האדמה הזאת" autocomplete="off" />
      </div>
      <div class="field">
        <label for="author">סופר / סופרת</label>
        <input id="author" type="text" placeholder="למשל: עמוס עוז" autocomplete="off" />
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="startAnalysis()">
      <!-- Quill icon -->
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M20 4 C20 4 14 6 10 12 C8 15 7 18 7 21 L9 19 C9 19 11 13 16 9"/>
        <path d="M7 21 C7 21 6 18 8 16"/>
        <line x1="20" y1="4" x2="17" y2="7"/>
      </svg>
      נתח את הספר
    </button>
  </div>
</div>

<!-- ── RESULT ── -->
<div id="result-section">
  <div class="result-bar">
    <span class="result-label" id="result-label"></span>
    <button class="copy-btn" onclick="copyResult()">העתק ניתוח</button>
  </div>
  <div class="result-card" id="result-card"></div>
</div>

<script>
  marked.setOptions({ breaks: true });

  let rawText  = "";
  let streaming = false;

  async function startAnalysis() {
    const name   = document.getElementById("username").value.trim();
    const book   = document.getElementById("book").value.trim();
    const author = document.getElementById("author").value.trim();

    if (!name)   { document.getElementById("username").focus(); return; }
    if (!book)   { document.getElementById("book").focus(); return; }
    if (!author) { document.getElementById("author").focus(); return; }
    if (streaming) return;

    streaming = true;
    rawText = "";

    // Collapse form → mini-bar
    const formCard  = document.getElementById("form-card");
    const miniBar   = document.getElementById("mini-bar");
    const miniLabel = document.getElementById("mini-book-label");

    formCard.style.opacity = "0";
    formCard.style.maxHeight = "0";
    formCard.style.padding   = "0";
    formCard.style.border    = "none";
    formCard.style.overflow  = "hidden";
    miniLabel.textContent = `«${book}» / ${author}`;
    setTimeout(() => { formCard.style.display = "none"; miniBar.style.display = "flex"; }, 280);

    // Show result section
    const section = document.getElementById("result-section");
    section.style.display = "block";
    document.getElementById("result-label").textContent = `«${book}» / ${author}`;

    const card = document.getElementById("result-card");
    card.innerHTML = `
      <div class="loading-state">
        <svg class="quill-anim" width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="#b8883a" stroke-width="1.3" stroke-linecap="round" opacity="0.7">
          <path d="M20 4 C20 4 14 6 10 12 C8 15 7 18 7 21 L9 19 C9 19 11 13 16 9"/>
          <path d="M7 21 C7 21 6 18 8 16"/>
          <line x1="20" y1="4" x2="17" y2="7"/>
        </svg>
        <span class="loading-text"><span class="loading-dots">קוראת את הספר וכותבת ניתוח</span></span>
      </div>`;

    setTimeout(() => section.scrollIntoView({ behavior: "smooth", block: "start" }), 100);

    try {
      const response = await fetch("/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, book, author }),
      });

      if (!response.ok) throw new Error(`שגיאת שרת ${response.status}`);

      const reader  = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer    = "";
      let firstChunk = true;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6);
          if (data === "[DONE]") { finish(); return; }
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) {
              card.innerHTML = `<p style="color:#b94040;padding:1rem">שגיאה: ${parsed.error}</p>`;
              finish(); return;
            }
            if (firstChunk) { card.innerHTML = ""; firstChunk = false; }
            rawText += parsed.text;
            card.innerHTML = marked.parse(rawText) + '<span class="cursor"></span>';
          } catch (_) {}
        }
      }
      finish();
    } catch (err) {
      card.innerHTML = `<p style="color:#b94040;padding:1rem">שגיאה: ${err.message}</p>`;
      finish();
    }
  }

  function finish() {
    streaming = false;
    if (rawText) document.getElementById("result-card").innerHTML = marked.parse(rawText);
  }

  function resetForm() {
    // Expand form back
    const formCard = document.getElementById("form-card");
    const miniBar  = document.getElementById("mini-bar");

    miniBar.style.display = "none";
    formCard.style.display = "";
    // Small delay for display to take effect before transition
    requestAnimationFrame(() => {
      formCard.style.opacity   = "";
      formCard.style.maxHeight = "";
      formCard.style.padding   = "";
      formCard.style.border    = "";
      formCard.style.overflow  = "";
    });

    // Clear fields
    document.getElementById("book").value   = "";
    document.getElementById("author").value = "";
    document.getElementById("result-section").style.display = "none";
    rawText   = "";
    streaming = false;

    setTimeout(() => document.getElementById("book").focus(), 300);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function copyResult() {
    if (!rawText) return;
    navigator.clipboard.writeText(rawText).then(() => {
      const btn = document.querySelector(".copy-btn");
      const orig = btn.textContent;
      btn.textContent = "✓ הועתק";
      setTimeout(() => btn.textContent = orig, 2500);
    });
  }

  document.getElementById("username").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("book").focus();
  });
  document.getElementById("book").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("author").focus();
  });
  document.getElementById("author").addEventListener("keydown", e => {
    if (e.key === "Enter") startAnalysis();
  });
</script>
</body>
</html>
