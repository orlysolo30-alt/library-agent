<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סוכן הספרייה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Assistant:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f7f4ee;
      --surface:  #ffffff;
      --border:   #e2ddd4;
      --text:     #2d2820;
      --muted:    #8c8070;
      --accent:   #6b5a3e;
      --accent-h: #4e4030;
      --gold:     #b8965a;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Assistant', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      direction: rtl;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 3.5rem 1.5rem 2.5rem;
    }

    .logo { font-size: 2rem; margin-bottom: 0.75rem; }

    h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.01em;
      margin-bottom: 0.4rem;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    /* ── FORM ── */
    .form-wrap {
      max-width: 580px;
      margin: 0 auto 2.5rem;
      padding: 0 1.25rem;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 2px 16px rgba(0 0 0 / 0.05);
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      font-family: 'Assistant', Arial, sans-serif;
      font-size: 0.97rem;
      color: var(--text);
      direction: rtl;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    input::placeholder { color: #c0b8a8; }

    input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184 150 90 / 0.12);
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }

    .submit-btn {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--accent-h);
      transform: translateY(-1px);
    }

    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ── RESULT ── */
    #result-section {
      max-width: 760px;
      margin: 0 auto 5rem;
      padding: 0 1.25rem;
      display: none;
    }

    .result-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
    }

    .result-label {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.05rem;
      color: var(--accent);
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.9rem;
      font-family: 'Assistant', Arial, sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
    }

    .copy-btn:hover { border-color: var(--gold); color: var(--accent); }

    /* ── ANALYSIS CARD ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1.5rem, 4vw, 2.75rem);
      box-shadow: 0 2px 20px rgba(0 0 0 / 0.05);
      line-height: 1.9;
    }

    /* Markdown */
    .result-card h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(1.2rem, 3vw, 1.55rem);
      color: var(--accent);
      margin: 0 0 1.25rem;
      padding-bottom: 0.65rem;
      border-bottom: 1px solid var(--border);
    }

    .result-card h2 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.1rem;
      color: var(--text);
      margin: 2rem 0 0.65rem;
      font-weight: 700;
    }

    .result-card h3 {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--accent);
      margin: 1.1rem 0 0.4rem;
    }

    .result-card p { margin: 0.6rem 0; }

    .result-card ul,
    .result-card ol { padding-right: 1.4rem; margin: 0.5rem 0; }

    .result-card li { margin: 0.3rem 0; }

    .result-card strong { color: var(--accent-h); }

    .result-card em { color: var(--muted); }

    .result-card blockquote {
      border-right: 3px solid var(--gold);
      padding: 0.45rem 1rem;
      margin: 1rem 0;
      color: var(--muted);
      font-style: italic;
      background: rgba(184 150 90 / 0.05);
      border-radius: 0 6px 6px 0;
    }

    .result-card hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* Streaming cursor */
    .cursor::after {
      content: '|';
      color: var(--gold);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Loading */
    .loading {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      padding: 2.5rem 1rem;
      font-size: 0.95rem;
    }
    .dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
      .form-card { padding: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📚</div>
  <h1>סוכן הספרייה</h1>
  <p>ניתוח ספרותי מעמיק — עלילה · דמויות · דימויים · ביקורת · שאלות לדיון</p>
</header>

<div class="form-wrap">
  <div class="form-card">
    <div class="field">
      <label for="username">שמך</label>
      <input id="username" type="text" placeholder="למשל: שרה" autocomplete="name" />
    </div>
    <div class="row">
      <div class="field">
        <label for="book">שם הספר</label>
        <input id="book" type="text" placeholder="למשל: האדמה הזאת" autocomplete="off" />
      </div>
      <div class="field">
        <label for="author">סופר / סופרת</label>
        <input id="author" type="text" placeholder="למשל: עמוס עוז" autocomplete="off" />
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="startAnalysis()">
      נתח את הספר
    </button>
  </div>
</div>

<div id="result-section">
  <div class="result-bar">
    <span class="result-label" id="result-label"></span>
    <button class="copy-btn" onclick="copyResult()">העתק ניתוח</button>
  </div>
  <div class="result-card" id="result-card">
    <div class="loading"><span class="dots">מכין ניתוח</span></div>
  </div>
</div>

<script>
  marked.setOptions({ breaks: true });

  let rawText = "";
  let streaming = false;

  async function startAnalysis() {
    const name   = document.getElementById("username").value.trim();
    const book   = document.getElementById("book").value.trim();
    const author = document.getElementById("author").value.trim();

    if (!name)   { document.getElementById("username").focus(); return; }
    if (!book)   { document.getElementById("book").focus(); return; }
    if (!author) { document.getElementById("author").focus(); return; }
    if (streaming) return;

    streaming = true;
    rawText = "";

    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "מנתח...";

    const section = document.getElementById("result-section");
    section.style.display = "block";
    document.getElementById("result-label").textContent = `«${book}» / ${author}`;

    const card = document.getElementById("result-card");
    card.innerHTML = '<div class="loading"><span class="dots">מנתח</span></div>';
    section.scrollIntoView({ behavior: "smooth", block: "start" });

    try {
      const response = await fetch("/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, book, author }),
      });

      if (!response.ok) throw new Error(`שגיאת שרת ${response.status}`);

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";
      let firstChunk = true;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6);
          if (data === "[DONE]") { finish(); return; }
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) {
              card.innerHTML = `<p style="color:#b94040">שגיאה: ${parsed.error}</p>`;
              finish(); return;
            }
            if (firstChunk) { card.innerHTML = ""; firstChunk = false; }
            rawText += parsed.text;
            card.innerHTML = marked.parse(rawText) + '<span class="cursor"></span>';
          } catch (_) {}
        }
      }
      finish();
    } catch (err) {
      card.innerHTML = `<p style="color:#b94040">שגיאה: ${err.message}</p>`;
      finish();
    }
  }

  function finish() {
    streaming = false;
    const btn = document.getElementById("submit-btn");
    btn.disabled = false;
    btn.textContent = "נתח ספר נוסף";
    if (rawText) document.getElementById("result-card").innerHTML = marked.parse(rawText);
  }

  function copyResult() {
    if (!rawText) return;
    navigator.clipboard.writeText(rawText).then(() => {
      const btn = document.querySelector(".copy-btn");
      const orig = btn.textContent;
      btn.textContent = "✓ הועתק";
      setTimeout(() => btn.textContent = orig, 2500);
    });
  }

  document.getElementById("username").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("book").focus();
  });
  document.getElementById("book").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("author").focus();
  });
  document.getElementById("author").addEventListener("keydown", e => {
    if (e.key === "Enter") startAnalysis();
  });
</script>
</body>
</html>
